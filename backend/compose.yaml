networks:
  net-user-crud:
    driver: bridge
services:
  mongo:
    image: bitnami/mongodb:latest
    environment:
      - MONGODB_ROOT_USER=${USER_DB}
      - MONGODB_DATABASE=${DB_NAME}
    ports:
      - 27017:27017
    volumes:
      - ./data:/bitnami/mongodb/data
    networks:
      - net-user-crud